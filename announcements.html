<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="https://www.twghkywc.edu.hk/sites/default/files/sch_logo.png" type="image/png">
    <title>全部公告 - KYWC 3D班網</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <header class="bg-white border-b border-gray-200 sticky top-0 z-20">
        <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="index.html#announcements" class="inline-flex items-center text-blue-700 hover:text-blue-900">
                <i class="fa fa-arrow-left mr-2"></i> 返回首頁
            </a>
            <h1 class="text-lg md:text-xl font-bold">全部公告</h1>
            <span id="category-badge" class="text-xs md:text-sm px-3 py-1 rounded-full bg-blue-100 text-blue-700 hidden"></span>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8">
        <div class="bg-white border border-gray-200 rounded-xl p-5 md:p-7 shadow-sm">
            <div id="loading-state" class="space-y-4">
                <div class="animate-pulse h-7 bg-gray-200 rounded w-1/3"></div>
                <div class="animate-pulse h-5 bg-gray-100 rounded w-2/3"></div>
                <div class="animate-pulse h-5 bg-gray-100 rounded w-full"></div>
            </div>
            <div id="announcement-list" class="space-y-5 hidden"></div>
            <div id="empty-state" class="hidden text-center py-12 text-gray-500">
                目前沒有符合條件的公告。
            </div>
        </div>
    </main>

    <script type="module">
        import { db } from "./firebase-config.js";
        import {
            collection,
            onSnapshot,
            orderBy,
            query,
            where
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const loadingState = document.getElementById("loading-state");
        const listContainer = document.getElementById("announcement-list");
        const emptyState = document.getElementById("empty-state");
        const badge = document.getElementById("category-badge");

        const params = new URLSearchParams(window.location.search);
        const category = (params.get("category") || "").trim();

        function escapeHTML(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function formatDate(rawDate) {
            if (!rawDate) return "待更新";
            if (typeof rawDate === "string") return rawDate;
            if (rawDate?.toDate instanceof Function) {
                return rawDate.toDate().toLocaleDateString("zh-HK", {
                    year: "numeric",
                    month: "2-digit",
                    day: "2-digit"
                });
            }
            if (rawDate instanceof Date) {
                return rawDate.toLocaleDateString("zh-HK", {
                    year: "numeric",
                    month: "2-digit",
                    day: "2-digit"
                });
            }
            return "待更新";
        }

        function renderAnnouncements(items) {
            if (!items.length) {
                listContainer.classList.add("hidden");
                emptyState.classList.remove("hidden");
                return;
            }

            emptyState.classList.add("hidden");
            listContainer.classList.remove("hidden");

            listContainer.innerHTML = items.map((item) => {
                const dateText = formatDate(item.publishAt ?? item.createdAt ?? item.updatedAt ?? item.date);
                const pinnedBadge = item.pinned
                    ? '<span class="inline-flex items-center px-2 py-0.5 rounded bg-amber-100 text-amber-700 text-xs mr-2"><i class="fa fa-thumb-tack mr-1"></i>置頂</span>'
                    : "";
                return `
                    <article class="border border-gray-200 rounded-lg p-4 md:p-5 hover:border-blue-300 transition-colors">
                        <h2 class="text-lg md:text-xl font-semibold text-blue-800 mb-2">${escapeHTML(item.title ?? "未命名公告")}</h2>
                        <p class="text-sm text-gray-500 mb-3">
                            ${pinnedBadge}
                            <i class="fa fa-calendar-o mr-1"></i> ${escapeHTML(dateText)}
                            <span class="mx-2">|</span>
                            <i class="fa fa-user-o mr-1"></i> ${escapeHTML(item.author ?? "班級管理組")}
                        </p>
                        <p class="text-gray-700 leading-7 whitespace-pre-line">${escapeHTML(item.content ?? "")}</p>
                    </article>
                `;
            }).join("");
        }

        if (category) {
            badge.textContent = `分類：${category}`;
            badge.classList.remove("hidden");
        }

        const pinnedFirstConstraints = [
            where("published", "==", true),
            orderBy("pinned", "desc"),
            orderBy("publishAt", "desc")
        ];
        if (category) {
            pinnedFirstConstraints.splice(1, 0, where("category", "==", category));
        }

        const fallbackConstraints = [
            where("published", "==", true),
            orderBy("publishAt", "desc")
        ];
        if (category) {
            fallbackConstraints.splice(1, 0, where("category", "==", category));
        }

        const subscribe = (targetQuery, isFallback = false) => onSnapshot(
            targetQuery,
            (snapshot) => {
                const items = snapshot.docs.map((doc) => ({ id: doc.id, ...doc.data() }));
                loadingState.classList.add("hidden");
                renderAnnouncements(items);
            },
            (error) => {
                console.error("[AnnouncementsPage] Firestore 監聽失敗:", error);
                if (!isFallback && error?.code === "failed-precondition") {
                    const fallbackQuery = query(collection(db, "announcements"), ...fallbackConstraints);
                    subscribe(fallbackQuery, true);
                    return;
                }
                loadingState.classList.add("hidden");
                listContainer.classList.add("hidden");
                emptyState.classList.remove("hidden");
                emptyState.textContent = `公告載入失敗：${error?.message || "未知錯誤"}`;
            }
        );
        const pinnedFirstQuery = query(collection(db, "announcements"), ...pinnedFirstConstraints);
        subscribe(pinnedFirstQuery, false);
    </script>
</body>
</html>
